name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          
      - name: Instalar dependências
        run: npm install
        
      - name: Compilar o projeto
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://brebvinutztbawpcnxzh.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_gOlellqcHKiWLpdMYZ_nqg_ZBSO8VAb
        
      - name: Criar 404.html para o React Router funcionar (SPA)
        run: cp dist/index.html dist/404.html
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Fazer upload dos ficheiros compilados
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
